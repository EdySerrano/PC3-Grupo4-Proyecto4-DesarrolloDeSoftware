name: CI de Audit-CLI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  
  python-ci: 
    name: CI de Python
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  

      - name: 3. Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 

      - name: 4. GATE: Linting con Flake8
        run: flake8 . --count --show-source --statistics

      - name: 5. GATE: Pruebas con Pytest y Cobertura
        env:
          PYTHONPATH: ./src
        run: pytest --cov=audit_cli --cov-fail-under=85